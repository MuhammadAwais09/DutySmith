<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #0A2A4E 0%, #1F8FF4 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: white; border-radius: 20px; padding: 60px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="bi bi-emoji-frown text-warning" style="font-size: 80px;"></i>
        <h1 class="mt-4">404</h1>
        <h4 class="text-muted">Page Not Found</h4>
        <p class="text-muted mb-4">The page you're looking for doesn't exist.</p>
        <a href="/" class="btn btn-primary btn-lg">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
    </div>
</body>
</html>
